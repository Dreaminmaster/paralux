<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Head-Tracked Parallax</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #canvas3d {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
    }
    #ui-overlay {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 10;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      pointer-events: none;
    }
    #ui-overlay .mode-tag {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 6px 14px;
      margin-bottom: 8px;
      backdrop-filter: blur(10px);
    }
    #ui-overlay .hint {
      opacity: 0.5;
      font-size: 12px;
      margin-top: 4px;
    }
    #cam-btn {
      position: fixed;
      bottom: 20px; right: 20px;
      z-index: 10;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 25px;
      color: rgba(255,255,255,0.7);
      padding: 10px 20px;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    #cam-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
    #cam-btn.active {
      background: rgba(100,200,255,0.15);
      border-color: rgba(100,200,255,0.4);
      color: #64c8ff;
    }
    #video-feed {
      position: fixed;
      bottom: 70px; right: 20px;
      width: 160px; height: 120px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      z-index: 10;
      display: none;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      z-index: 999;
      transition: opacity 0.8s;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    #loading span {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      letter-spacing: 3px;
    }
  </style>
</head>
<body>
  <div id="loading"><span>LOADING...</span></div>

  <div id="ui-overlay">
    <div class="mode-tag" id="mode-tag">🖱️ 鼠标视差模式</div>
    <div class="hint">移动鼠标探索 3D 空间</div>
  </div>

  <canvas id="canvas3d"></canvas>
  <video id="video-feed" autoplay playsinline></video>
  <button id="cam-btn" onclick="toggleCamera()">📷 开启摄像头追踪</button>

  <!-- Three.js via CDN (global) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
